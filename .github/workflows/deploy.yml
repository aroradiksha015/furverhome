name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd fureverhome
            git pull origin main

            docker stop fureverhome-container || true
            docker rm fureverhome-container || true

            docker build --no-cache -t fureverhome .

            docker run -d -p 80:80 \
            --name fureverhome-container \
            fureverhome
